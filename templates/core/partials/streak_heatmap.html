<!-- Streak Heatmap (GitHub-style, vanilla JS) -->
<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:24px;">
    <div style="font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);margin-bottom:16px;">🔥 Activity Heatmap</div>
    <div id="streak-heatmap" style="overflow-x:auto;"></div>
    <div style="display:flex;align-items:center;gap:8px;margin-top:12px;font-size:11px;color:var(--text-muted);">
        <span>Less</span>
        <div style="width:11px;height:11px;border-radius:2px;background:var(--bg-hover);"></div>
        <div style="width:11px;height:11px;border-radius:2px;background:rgba(0,255,136,0.3);"></div>
        <div style="width:11px;height:11px;border-radius:2px;background:rgba(0,255,136,0.6);"></div>
        <div style="width:11px;height:11px;border-radius:2px;background:var(--accent-green);"></div>
        <span>More</span>
    </div>
</div>

<script>
(function() {
    const activeDates = new Set({{ streak_data_json|safe }});
    const container = document.getElementById('streak-heatmap');
    if (!container) return;

    const today = new Date();
    const WEEKS = 26; // 6 months
    const DAYS = 7;

    // Calculate start date (Sunday of 26 weeks ago)
    const start = new Date(today);
    start.setDate(start.getDate() - (WEEKS * 7) + (6 - start.getDay()));

    const grid = document.createElement('div');
    grid.style.cssText = 'display:grid;grid-template-columns:repeat(' + WEEKS + ',13px);grid-template-rows:repeat(7,13px);gap:2px;';

    for (let w = 0; w < WEEKS; w++) {
        for (let d = 0; d < DAYS; d++) {
            const cellDate = new Date(start);
            cellDate.setDate(start.getDate() + w * 7 + d);
            const iso = cellDate.toISOString().split('T')[0];
            const isActive = activeDates.has(iso);
            const isFuture = cellDate > today;

            const cell = document.createElement('div');
            cell.style.cssText = 'width:11px;height:11px;border-radius:2px;cursor:default;transition:opacity 0.15s;' +
                'background:' + (isFuture ? 'transparent' : isActive ? 'var(--accent-green)' : 'var(--bg-hover)') + ';';
            cell.title = iso + (isActive ? ' — Active' : '');
            grid.appendChild(cell);
        }
    }
    container.appendChild(grid);
})();
</script>
