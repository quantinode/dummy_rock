<!-- Skills Radar Chart (Chart.js) -->
<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:24px;">
    <div style="font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);margin-bottom:16px;">🕸 Skills Radar</div>
    <canvas id="skills-radar-chart" width="280" height="260"></canvas>
</div>

<script>
(function() {
    const radarData = {{ radar_data_json|safe }};
    const labels = Object.keys(radarData);
    const values = Object.values(radarData);

    if (!labels.length) {
        document.getElementById('skills-radar-chart').parentElement.style.display = 'none';
        return;
    }

    const ctx = document.getElementById('skills-radar-chart').getContext('2d');
    new Chart(ctx, {
        type: 'radar',
        data: {
            labels: labels,
            datasets: [{
                label: 'Skill Level',
                data: values,
                borderColor: 'var(--accent-green)',
                backgroundColor: 'rgba(0,255,136,0.12)',
                borderWidth: 2,
                pointBackgroundColor: 'var(--accent-green)',
                pointRadius: 4,
            }]
        },
        options: {
            responsive: false,
            scales: {
                r: {
                    angleLines: { color: 'rgba(255,255,255,0.06)' },
                    grid: { color: 'rgba(255,255,255,0.06)' },
                    pointLabels: { color: '#8888aa', font: { size: 11, family: 'Inter' } },
                    ticks: { display: false, maxTicksLimit: 5 },
                    min: 0,
                    max: 100,
                }
            },
            plugins: { legend: { display: false } }
        }
    });
})();
</script>
