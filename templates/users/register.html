{% extends "base.html" %}
{% block title %}Sign Up — AI Lab{% endblock %}

{% block content %}
<style>
  .login-wrap {
    min-height: 80vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }
  .login-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 40px;
    width: 100%;
    max-width: 420px;
  }
  .login-card h1 {
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 8px;
  }
  .login-card p.sub {
    color: var(--text-secondary);
    margin-bottom: 32px;
    font-size: 0.95rem;
  }
  .field {
    margin-bottom: 20px;
  }
  .field label {
    display: block;
    font-size: 0.85rem;
    color: var(--text-secondary);
    margin-bottom: 6px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .field input {
    width: 100%;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    color: var(--text-primary);
    font-size: 1rem;
    font-family: inherit;
    box-sizing: border-box;
    transition: border-color 0.2s;
  }
  .field input:focus {
    outline: none;
    border-color: var(--accent-green);
  }
  .error-msg {
    background: rgba(255, 80, 80, 0.1);
    border: 1px solid rgba(255, 80, 80, 0.3);
    border-radius: 8px;
    padding: 12px 16px;
    color: #ff6060;
    font-size: 0.9rem;
    margin-bottom: 20px;
  }
  .btn-login {
    width: 100%;
    background: var(--accent-green);
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 14px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s;
    margin-top: 8px;
  }
  .btn-login:hover { opacity: 0.85; }
  .switch-link {
    text-align: center;
    margin-top: 24px;
    font-size: 0.9rem;
    color: var(--text-secondary);
  }
  .switch-link a {
    color: var(--accent-green);
    text-decoration: none;
    font-weight: 600;
  }
  .switch-link a:hover { text-decoration: underline; }
</style>

<div class="login-wrap">
  <div class="login-card">
    <h1>Create account</h1>
    <p class="sub">Join AI Lab to start learning.</p>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="your_username" required autofocus>
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Min. 8 characters" required>
      </div>
      <div class="field">
        <label for="password2">Confirm Password</label>
        <input type="password" id="password2" name="password2" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-login">Create Account</button>
    </form>

    <p class="switch-link">Already have an account? <a href="{% url 'login_page' %}">Sign in</a></p>
  </div>
</div>
{% endblock %}
