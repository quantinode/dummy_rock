{% extends "base.html" %}
{% block title %}Reset Password — Quantinodes{% endblock %}

{% block content %}
<style>
  .auth-wrap { min-height: 80vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
  .auth-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 48px 40px; width: 100%; max-width: 420px; }
  .auth-card h1 { font-size: 1.7rem; font-weight: 700; color: var(--text-primary); margin-bottom: 8px; }
  .auth-card p.sub { color: var(--text-secondary); margin-bottom: 32px; font-size: 0.95rem; line-height: 1.6; }
  .field { margin-bottom: 20px; }
  .field label { display: block; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 6px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }
  .field input { width: 100%; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; color: var(--text-primary); font-size: 1rem; font-family: inherit; box-sizing: border-box; transition: border-color 0.2s; }
  .field input:focus { outline: none; border-color: var(--accent-green); }
  .btn-submit { width: 100%; background: var(--accent-green); color: #fff; border: none; border-radius: 8px; padding: 14px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: opacity 0.2s; margin-top: 8px; }
  .btn-submit:hover { opacity: 0.85; }
  .back-link { text-align: center; margin-top: 24px; font-size: 0.9rem; color: var(--text-secondary); }
  .back-link a { color: var(--accent-green); text-decoration: none; font-weight: 600; }
</style>

<div class="auth-wrap">
  <div class="auth-card">
    <h1>Reset your password</h1>
    <p class="sub">Enter the email address you used to register. We'll send you a link to reset your password.</p>

    <form method="post">
      {% csrf_token %}
      <div class="field">
        <label for="id_email">Email address</label>
        <input type="email" name="email" id="id_email" placeholder="you@email.com" required autofocus>
      </div>
      <button type="submit" class="btn-submit">Send Reset Link</button>
    </form>

    <p class="back-link"><a href="/login/">Back to Login</a></p>
  </div>
</div>
{% endblock %}
