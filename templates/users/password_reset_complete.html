{% extends "base.html" %}
{% block title %}Password Reset Done — Quantinodes{% endblock %}

{% block content %}
<style>
  .auth-wrap { min-height: 80vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
  .auth-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 48px 40px; width: 100%; max-width: 420px; text-align: center; }
  .check-icon { width: 64px; height: 64px; background: rgba(0,168,84,0.12); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; }
  .auth-card h1 { font-size: 1.7rem; font-weight: 700; color: var(--text-primary); margin-bottom: 12px; }
  .auth-card p { color: var(--text-secondary); font-size: 0.95rem; line-height: 1.6; margin-bottom: 16px; }
  .btn-login { display: inline-block; background: var(--accent-green); color: #fff; text-decoration: none; font-weight: 700; padding: 14px 36px; border-radius: 8px; font-size: 1rem; margin-top: 16px; }
  .btn-login:hover { opacity: 0.85; }
</style>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="check-icon">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#00a854" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 6L9 17l-5-5"/>
      </svg>
    </div>
    <h1>Password updated</h1>
    <p>Your password has been successfully reset. You can now log in with your new password.</p>
    <a href="/login/" class="btn-login">Go to Login</a>
  </div>
</div>
{% endblock %}
